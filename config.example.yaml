host: ""
port: 8317

auth-dir: "~/.rusuh"

api-keys:
  - "your-api-key"

debug: false
request-retry: 3

routing:
  strategy: "round-robin"

# Management API settings
# All /v0/management/ routes require this key.
# Leave empty to disable the management API entirely (404).
remote-management:
  allow-remote: false
  secret-key: ""

