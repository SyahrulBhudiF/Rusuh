services:
  rusuh:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${RUSUH_IMAGE:-rusuh:local}
    ports:
      - "${RUSUH_PORT:-8317}:8317"
    volumes:
      - ${RUSUH_CONFIG_PATH:-./config.yaml}:/app/config.yaml:ro
      - ${RUSUH_AUTH_VOLUME:-rusuh-auth}:/home/rusuh/.rusuh
    environment:
      RUST_LOG: ${RUSUH_LOG:-rusuh=info,tower_http=debug}
    healthcheck:
      test: ["CMD", "sh", "-c", "python3 - <<'PY'\nimport sys, urllib.request\ntry:\n    with urllib.request.urlopen('http://127.0.0.1:8317/health', timeout=5) as response:\n        sys.exit(0 if response.status == 200 else 1)\nexcept Exception:\n    sys.exit(1)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
volumes:
  rusuh-auth:
